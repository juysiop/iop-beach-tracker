<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Isle of Palms Beach Renourishment Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/light/main.css">
  <link rel="stylesheet" href="style.css">

  <script src="https://js.arcgis.com/4.32/"></script>
</head>

<body>
  <div id="viewDiv"></div>

  <div id="infoPanel">
    <h1>Beach Renourishment Tracker</h1>
    <p>View current and forecasted work areas for the Isle of Palms beach renourishment project.</p>
    <p class="note">Forecasts are estimates and may change due to weather, tides, equipment, or operational needs.</p>
  </div>

  <div id="tractorPulse"></div>
<div id="timelinePanel">
  <div id="timelineHeader">
    <strong id="selectedDateLabel">Today</strong>
    <button id="todayButton">Today</button>
  </div>

  <input
    id="dateSlider"
    type="range"
    min="0"
    max="100"
    value="0"
  />

  <div id="timelineLabels">
    <span>July</span>
    <span>August</span>
    <span>September</span>
    <span>October</span>
  </div>
</div>
  <script src="app.js"></script>
</body>
</html>
